<!--
  Contract 2 (integration seam) — see docs/superpowers/specs/2026-07-17-creature-swarm-design.md
  The coordinator fills these named slots and never freehands markup.
  All assets must be inlined (base64) so the final page is one portable file.
  {{model_viewer}} and {{video}} are omitted (left blank) when those artifacts
  weren't produced, so a text-only run still yields a valid page.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{creature_name}} — Field Guide</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body { font-family: Georgia, serif; max-width: 780px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { font-size: 2rem; margin-bottom: 0; }
    .tagline { color: #666; font-style: italic; margin-top: 0.25rem; }
    .doodle { max-width: 240px; float: right; margin: 0 0 1rem 1rem; border: 1px solid #ddd; }
    section { margin-top: 2rem; }
    model-viewer { width: 100%; height: 400px; background: #f4f4f4; }
    video { width: 100%; }
  </style>
</head>
<body>
  <img class="doodle" src="{{doodle_img}}" alt="original doodle" />
  <h1>{{creature_name}}</h1>
  <p class="tagline">{{tagline}}</p>

  <section id="biology">{{biology_html}}</section>
  <section id="habitat">{{habitat_html}}</section>
  <section id="society">{{society_html}}</section>

  <section id="model">{{model_viewer}}</section>
  <section id="video">{{video}}</section>
</body>
</html>
