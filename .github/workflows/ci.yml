name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.14 is required, not aspirational: scipy/trimesh/numpy/pillow all publish
        # real cp314 wheels already, so there's no source-build tax for staying current.
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked
      # Scoped to lib/ and agents/ via [tool.mypy] in pyproject.toml, not the whole
      # repo — see the comment there for why evals/ is excluded (a preview SDK's
      # generated response unions, not this codebase's own typing debt).
      - run: uv run mypy

  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked
      # jsonschema is a locked runtime dependency, but the check it powers degrades to
      # a silent pass if the import ever fails again — assert it here so that specific
      # regression shows up as a red CI step instead of a suite that still says GREEN.
      - run: uv run python -c "import jsonschema"
      # The key is scoped to this step alone, not the job or the workflow. The other
      # jobs are deliberately offline (see tests/test_serve.py's docstring), and a key
      # in their environment is how an offline suite quietly starts making live calls.
      - run: uv run evals/run_evals.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
