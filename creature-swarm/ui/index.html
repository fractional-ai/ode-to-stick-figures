<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Creature Gallery</title>
<style>
  :root{
    --sky1:#eaf6ff; --sky2:#fdf3e7; --card:#fff; --ink:#40514b; --dim:#8b9a93;
    --line:#e4ece8; --accent:#ff5964; --ok:#5ac85a; --shadow:0 4px 20px rgba(60,70,90,.10);
    --paper:#fbfcfb;
  }
  @media (prefers-color-scheme:dark){
    :root{ --sky1:#1a2430; --sky2:#241f31; --card:#232c33; --ink:#dce8e2; --dim:#8fa39a;
           --line:#33403a; --shadow:0 4px 20px rgba(0,0,0,.35);
           --paper:#f2f4f2; /* deliberately NOT dark — see .shot */ }
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; color:var(--ink);
    font-family:ui-rounded,-apple-system,"Segoe UI",system-ui,sans-serif;
    background:linear-gradient(160deg,var(--sky1),var(--sky2));
  }
  .wrap{max-width:1100px; margin:0 auto; padding:2.2rem 1.2rem 4rem}
  h1{margin:0 0 .2rem; font-size:1.9rem; letter-spacing:-.01em}
  .sub{color:var(--dim); margin:0 0 1.6rem; font-size:.95rem}

  /* display:block is load-bearing — a <label> is inline, so without it the drop
     zone collapses to a sliver and the grid flows up over it. */
  #drop{
    display:block; width:100%;
    border:2.5px dashed var(--line); border-radius:18px; padding:1.6rem;
    text-align:center; color:var(--dim); background:var(--card);
    transition:border-color .15s, transform .15s, background .15s; cursor:pointer;
    margin-bottom:1.8rem;
  }
  #drop.hot{border-color:var(--accent); color:var(--ink); transform:scale(1.01)}
  #drop b{color:var(--ink)}
  #drop input{display:none}

  /* stretch keeps every row the same height; without it cards jag by caption length */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:1.1rem; align-items:stretch;
  }
  .card{
    background:var(--card); border-radius:16px; overflow:hidden; box-shadow:var(--shadow);
    display:flex; flex-direction:column; transition:transform .15s;
  }
  .card .meta{margin-top:auto}
  .card.live{cursor:pointer}
  .card.live:hover{transform:translateY(-3px)}
  /* flex:1 rather than a fixed aspect-ratio. The grid stretches every card to its
     row's height; a fixed-ratio shot refuses to grow, so the slack fell through as a
     white band under short/wide drawings (a bee, a very long millipede). Growing the
     shot means the transparency checkerboard fills the card and the drawing stays
     centred in it. min-height keeps tall drawings from squashing the row. */
/* The thumbnail always sits on PAPER, in both themes. A keyed drawing is transparent
     ink, and children draw in black marker — on a dark card the drawing simply vanished
     (a black millipede on #232c33 is not a thumbnail). The creature is the content, so
     it gets a light ground regardless of the viewer's theme; the checker stays on top
     of it so it still reads as "background removed". */
  .shot{
    flex:1; min-height:200px; display:grid; place-items:center; padding:.7rem;
    background:
      repeating-conic-gradient(#0000 0 25%, #0000000d 0 50%) 0 0/16px 16px,
      var(--paper);
  }
  .shot img{max-width:100%; max-height:100%; object-fit:contain}
  .meta{padding:.7rem .85rem .85rem; border-top:1px solid var(--line)}
  /* Let names and taglines WRAP. They were nowrap+ellipsis, which truncated 12 of 14
     taglines — and the tagline is the joke ("far too much bee for these legs, und…").
     Clamp to a couple of lines so cards stay tidy without eating the punchline. */
  .nm{
    font-weight:650; font-size:.94rem; line-height:1.25;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; overflow-wrap:anywhere;
  }
  .vb{
    color:var(--dim); font-size:.79rem; font-style:italic; margin-top:.2rem;
    line-height:1.35;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
    overflow:hidden; overflow-wrap:anywhere;
  }
  .tag{
    display:inline-block; margin-top:.5rem; font-size:.68rem; font-weight:700;
    letter-spacing:.04em; text-transform:uppercase; padding:.16rem .5rem; border-radius:99px;
  }
  .tag.on{background:color-mix(in srgb,var(--ok) 18%,transparent); color:var(--ok)}
  .tag.off{background:color-mix(in srgb,var(--dim) 16%,transparent); color:var(--dim)}
  .tag.no{background:color-mix(in srgb,var(--accent) 15%,transparent); color:var(--accent)}
  .acts{display:flex; gap:.4rem; margin-top:.6rem}
  .acts button, .acts a.btn{
    flex:1; border:1px solid var(--line); background:transparent; color:var(--ink);
    border-radius:8px; padding:.32rem .3rem; font-size:.74rem; font-weight:650;
    cursor:pointer; font-family:inherit; text-align:center; text-decoration:none;
    display:block; line-height:1.5;
  }
  .acts button:hover, .acts a.btn:hover{background:var(--line)}

  dialog{
    border:none; border-radius:20px; padding:0; width:min(94vw,920px);
    background:var(--card); box-shadow:0 20px 70px rgba(0,0,0,.4);
  }
  dialog::backdrop{background:rgba(20,28,26,.55); backdrop-filter:blur(3px)}
  dialog iframe{width:100%; height:min(62vh,540px); border:0; display:block}
  .dlg-bar{display:flex; justify-content:space-between; align-items:center;
           padding:.7rem 1rem; border-bottom:1px solid var(--line)}
  .dlg-bar button{
    border:none; background:var(--line); color:var(--ink); border-radius:9px;
    padding:.35rem .7rem; cursor:pointer; font-size:.85rem; font-weight:600;
  }
  #log{margin-top:1rem; font-size:.83rem; color:var(--dim); white-space:pre-wrap; line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <h1>Creature Gallery</h1>
  <p class="sub">Children's drawings, walking around. Click any animated creature to watch it.</p>

  <label id="drop">
    <input type="file" accept="image/*" multiple>
    <div><b>Drop a drawing here</b> — or click to pick a file</div>
    <div style="font-size:.8rem;margin-top:.3rem">We'll key the paper away and tell you what we can do with it</div>
  </label>

  <div class="grid" id="grid"></div>
  <div id="log"></div>
</div>

<dialog id="dlg">
  <div class="dlg-bar"><strong id="dlg-name"></strong><button id="dlg-x">Close</button></div>
  <iframe id="dlg-f" title="walk cycle"></iframe>
</dialog>

<script>
const grid = document.getElementById('grid');
const log  = document.getElementById('log');
const dlg  = document.getElementById('dlg');

// Names, taglines and refusal reasons are model-authored and land in innerHTML.
// Nothing hostile so far, but an apostrophe or a stray < shouldn't be able to break
// the card, let alone the page.
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => (
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function load() {
  const items = await (await fetch('/api/creatures')).json();
  grid.innerHTML = '';
  for (const c of items) {
    const el = document.createElement('div');
    el.className = 'card' + (c.animated ? ' live' : '');
    const tag = c.animated ? ['on','animated']
              : c.refused  ? ['no',"won't animate"]
              :              ['off','needs a rig'];
    el.innerHTML = `
      <div class="shot"><img loading="lazy" src="/thumb/${encodeURIComponent(c.stem)}"
             alt="${esc(c.name)} — child's drawing, background removed"></div>
      <div class="meta">
        <div class="nm">${esc(c.name)}</div>
        <div class="vb">${esc(c.refused || c.vibe) || '&nbsp;'}</div>
        <span class="tag ${tag[0]}">${tag[1]}</span>
        ${c.animated ? `<div class="acts">
          <button data-a="anim">▶ walk</button>
          <a class="btn" target="_blank" rel="noopener"
             href="/guide/${encodeURIComponent(c.stem)}">📖 field guide</a>
        </div>` : ''}
      </div>`;
    if (c.animated) {
      el.querySelector('[data-a=anim]').onclick = e => { e.stopPropagation(); open(c); };
      // A real link, not window.open + document.write from a fetch callback — that
      // reads as a popup and browsers block it, which is why this looked broken.
      el.querySelector('a.btn').onclick = e => e.stopPropagation();
      el.onclick = () => open(c);
    }
    if (c.refused) el.title = 'Refused: ' + c.refused;
    grid.appendChild(el);
  }
}

function open(c) {
  document.getElementById('dlg-name').textContent = c.name;
  document.getElementById('dlg-f').src = '/anim/' + encodeURIComponent(c.stem);
  dlg.showModal();
}

// ---- drag & drop -----------------------------------------------------------
const drop = document.getElementById('drop');
const input = drop.querySelector('input');
const hot = on => e => { e.preventDefault(); drop.classList.toggle('hot', on); };
drop.addEventListener('dragover', hot(true));
drop.addEventListener('dragleave', hot(false));
drop.addEventListener('drop', e => { hot(false)(e); send([...e.dataTransfer.files]); });
input.addEventListener('change', () => send([...input.files]));

async function send(files) {
  for (const f of files) {
    log.textContent += `\n${f.name} — keying…`;
    const fd = new FormData(); fd.append('file', f);
    try {
      const r = await fetch('/api/upload', { method: 'POST', body: fd });
      const j = await r.json();
      if (j.error) { log.textContent += ` ✗ ${j.error}`; continue; }
      const s = j.stats;
      log.textContent += ` kept ${(s.kept_frac*100).toFixed(0)}% · ${s.blobs} blob(s) · dominance ${s.dominance}`;
      if (j.warning) log.textContent += `\n  ⚠ ${j.warning}`;
      if (j.needs_rig) log.textContent += `\n  → in the gallery as "needs a rig": the vision pass that authors joints isn't wired up yet.`;
    } catch (err) {
      log.textContent += ` ✗ ${err}`;
    }
  }
  load();
}

load();
</script>
</body>
</html>
